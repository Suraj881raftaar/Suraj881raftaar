name: Generate Snake Game

on:
  schedule:
    # Run once every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Update Snake Game
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake animation
        uses: platane/snk@v3
        with:
          # github user name to read the contribution graph from
          github_user_name: ${{ github.repository_owner }}
          # list of files to generate. Use dark themes for proper dark-theme compatibility
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-animated.svg?color_snake=#8B5CF6&color_dots=#1F2937,#374151,#4B5563,#6B7280,#9CA3AF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
