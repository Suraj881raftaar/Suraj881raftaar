<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="8" fill="url(#bgGrad)" stroke="#334155" stroke-width="1.5" />
  
  <!-- Subtle Grid overlay -->
  <path d="M 0 40 L 400 40 M 0 80 L 400 80 M 0 120 L 400 120 M 0 160 L 400 160 M 80 0 L 80 200 M 160 0 L 160 200 M 240 0 L 240 200 M 320 0 L 320 200" stroke="url(#gridGrad)" stroke-width="1" />

  <!-- Chat Bubbles Illustration -->
  <g transform="translate(230, 45)">
    <!-- Speech bubble left -->
    <rect x="0" y="20" width="110" height="50" rx="12" fill="#334155" fill-opacity="0.6" stroke="#475569" stroke-width="1.5" />
    <path d="M 15 70 L 15 80 L 25 70 Z" fill="#334155" stroke="#475569" stroke-width="1.5" />
    <!-- Dot typing animation inside bubble -->
    <circle cx="35" cy="45" r="4" fill="#94A3B8" />
    <circle cx="55" cy="45" r="4" fill="#94A3B8" />
    <circle cx="75" cy="45" r="4" fill="#94A3B8" />

    <!-- Speech bubble right (User/AI response) -->
    <rect x="40" y="80" width="110" height="50" rx="12" fill="url(#accentGrad)" fill-opacity="0.3" stroke="#A78BFA" stroke-width="1.5" />
    <path d="M 135 130 L 135 140 L 125 130 Z" fill="#8B5CF6" stroke="#A78BFA" stroke-width="1.5" stroke-linejoin="round" />
    
    <!-- Code block icon inside right bubble -->
    <path d="M 80 100 L 70 105 L 80 110 M 110 100 L 120 105 L 110 110" stroke="#F5F5F5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="97" y1="98" x2="93" y2="112" stroke="#F5F5F5" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Title Text -->
  <text x="30" y="55" font-family="'Inter', sans-serif" font-weight="800" font-size="22" fill="#FFFFFF" letter-spacing="-0.02em">Chat World</text>
  <text x="30" y="80" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#EC4899" letter-spacing="0.05em" text-transform="uppercase">LLM Chat Application</text>
</svg>
