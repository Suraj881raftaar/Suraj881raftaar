<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="8" fill="url(#bgGrad)" stroke="#334155" stroke-width="1.5" />
  
  <!-- Subtle Grid overlay -->
  <path d="M 0 40 L 400 40 M 0 80 L 400 80 M 0 120 L 400 120 M 0 160 L 400 160 M 80 0 L 80 200 M 160 0 L 160 200 M 240 0 L 240 200 M 320 0 L 320 200" stroke="url(#gridGrad)" stroke-width="1" />

  <!-- Book stack illustration -->
  <g transform="translate(240, 60)">
    <!-- Book 1 (Bottom) -->
    <rect x="0" y="60" width="100" height="20" rx="3" fill="#1E293B" stroke="#475569" stroke-width="1.5" />
    <path d="M 10 60 L 10 80 M 90 60 L 90 80" stroke="#475569" stroke-width="1.5" />
    <rect x="15" y="65" width="60" height="10" rx="1" fill="#334155" />
    
    <!-- Book 2 (Middle) -->
    <rect x="10" y="38" width="85" height="22" rx="3" fill="url(#accentGrad)" stroke="#60A5FA" stroke-width="1.5" />
    <path d="M 20 38 L 20 60 M 80 38 L 80 60" stroke="#60A5FA" stroke-width="1.5" />
    <line x1="28" y1="49" x2="72" y2="49" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" />

    <!-- Book 3 (Top, tilted) -->
    <g transform="translate(15, 20) rotate(-12)">
      <rect x="0" y="0" width="75" height="18" rx="3" fill="#10B981" stroke="#34D399" stroke-width="1.5" />
      <path d="M 10 0 L 10 18 M 65 0 L 65 18" stroke="#34D399" stroke-width="1.5" />
    </g>
  </g>

  <!-- Database symbol in background -->
  <g transform="translate(180, 130)" stroke="#475569" stroke-width="1.5" fill="none">
    <ellipse cx="20" cy="10" rx="18" ry="6" fill="#1E293B" />
    <path d="M 2 10 L 2 22 A 18 6 0 0 0 38 22 L 38 10" />
    <path d="M 2 22 L 2 34 A 18 6 0 0 0 38 34 L 38 22" />
  </g>

  <!-- Title Text -->
  <text x="30" y="55" font-family="'Inter', sans-serif" font-weight="800" font-size="22" fill="#FFFFFF" letter-spacing="-0.02em">Library Mgmt System</text>
  <text x="30" y="80" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#3B82F6" letter-spacing="0.05em" text-transform="uppercase">Management &amp; Inventory Suite</text>
</svg>
