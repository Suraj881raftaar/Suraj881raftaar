<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="8" fill="url(#bgGrad)" stroke="#334155" stroke-width="1.5" />
  
  <!-- Subtle Grid overlay -->
  <path d="M 0 40 L 400 40 M 0 80 L 400 80 M 0 120 L 400 120 M 0 160 L 400 160 M 80 0 L 80 200 M 160 0 L 160 200 M 240 0 L 240 200 M 320 0 L 320 200" stroke="url(#gridGrad)" stroke-width="1" />

  <!-- CCTV Camera and Detection Bounding Box Illustration -->
  <g transform="translate(240, 50)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Camera Body -->
    <path d="M 10 30 L 60 10 L 85 45 L 35 65 Z" fill="#334155" stroke="#475569" stroke-width="2" />
    <!-- Camera Lens -->
    <ellipse cx="85" cy="45" rx="8" ry="12" fill="#111827" stroke="#475569" stroke-width="1.5" transform="rotate(-15, 85, 45)" />
    <circle cx="85" cy="45" r="4" fill="#EF4444" /> <!-- Red status light -->
    <!-- Camera Bracket -->
    <path d="M 25 50 L 15 75 L 0 75" fill="none" stroke="#475569" stroke-width="3.5" />

    <!-- Scanning target bracket (YOLO bounding box look) -->
    <g transform="translate(10, 60)" stroke="#10B981" stroke-width="1.5" fill="none">
      <!-- Bounding Box Corners -->
      <path d="M 40 10 L 30 10 L 30 20" />
      <path d="M 100 10 L 110 10 L 110 20" />
      <path d="M 30 60 L 30 70 L 40 70" />
      <path d="M 110 60 L 110 70 L 100 70" stroke="#10B981" />
      
      <!-- Label tag -->
      <rect x="30" y="-5" width="55" height="15" fill="#10B981" rx="2" />
      <text x="57.5" y="6" font-family="'JetBrains Mono', monospace" font-size="9" fill="#000000" font-weight="800" text-anchor="middle">PERSON: 98%</text>
    </g>
  </g>

  <!-- Title Text -->
  <text x="30" y="55" font-family="'Inter', sans-serif" font-weight="800" font-size="22" fill="#FFFFFF" letter-spacing="-0.02em">AI School Surveillance</text>
  <text x="30" y="80" font-family="'Inter', sans-serif" font-weight="500" font-size="12" fill="#EF4444" letter-spacing="0.05em" text-transform="uppercase">YOLOv8 CCTV Analytics Suite</text>
</svg>
